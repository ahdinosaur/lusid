log = "info"

# A dotfiles-style plan that links a small set of config files and one config
# directory into the operator's `$HOME`. Designed for `lusid local apply` —
# under local apply, sourced files become symlinks pointing back at the source
# in this repo, so editing `./files/zshrc` here takes effect immediately.
# Under `dev apply`/`remote apply` the same plan would copy the bytes onto the
# target machine instead, since the operator's filesystem isn't reachable
# from there.

[machines.localhost]
hostname = "localhost"
arch = "x86-64"
os = { type = "linux", linux = "debian" }
plan = "./dotfiles.lusid"
# `home` is whichever directory the symlinks should land under. Override with
# `--params '{"home": "/home/<you>"}'` or edit here.
params = { home = "/home/me" }
